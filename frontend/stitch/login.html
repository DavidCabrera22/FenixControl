<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#260a42",
                        "background-light": "#f7f6f8",
                        "background-dark": "#191121",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center p-4">
<div class="max-w-5xl w-full bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">
<!-- Left Side: Image/Branding (Visible on MD and up) -->
<div class="hidden md:flex md:w-1/2 bg-primary relative overflow-hidden items-center justify-center p-12">
<div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-slate-200 via-primary to-primary"></div>
<div class="relative z-10 text-center">
<div class="mb-8 flex justify-center">
<div class="bg-white/10 p-4 rounded-full backdrop-blur-sm">
<span class="material-symbols-outlined text-white text-6xl">account_balance</span>
</div>
</div>
<h2 class="text-white text-3xl font-bold mb-4">Sistema FÉNIX</h2>
<p class="text-slate-300 text-lg">Control de Cuentas &amp; Gestión Financiera de Alto Nivel</p>
</div>
<div class="absolute bottom-0 left-0 w-full h-full bg-cover bg-center mix-blend-overlay opacity-30" data-alt="Modern professional office building with glass facade" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCBpFJclatyow7AtzlUhGvaShfPzTW6fW6R-iXVss0Zy8XIIbF71aAIVt38UQaMmnEOtQN7sAYYbJ8-71PM3OCn-9tfgsK2oBM5XpYUMYcqLM4HAkOkKzx2T5BIjMcXH8LLE5epdyzFyXtGdv9yHTxBNuEJOwvSxTQPI4r3Bu0cNzFp9kxmJ4vfRVKBu5Ms8etA-X5wGVv_S7GgtyMMB2Pvbii4QUtdfmRKWYO9438fpIphynGIbGgdjFibK_Ed2qIvwQaLLTLEmobn')"></div>
</div>
<!-- Right Side: Login Form -->
<div class="w-full md:w-1/2 p-8 lg:p-16 flex flex-col justify-center">
<div class="mb-10 text-center md:text-left">
<div class="flex items-center gap-2 mb-6 justify-center md:justify-start">
<span class="material-symbols-outlined text-primary text-3xl">payments</span>
<span class="text-primary font-bold text-xl tracking-tight">FÉNIX</span>
</div>
<h1 class="text-slate-900 dark:text-slate-100 text-3xl font-bold leading-tight mb-2">Bienvenido de nuevo</h1>
<p class="text-slate-500 dark:text-slate-400 text-base">Ingresa tus credenciales para acceder al sistema</p>
</div>
<form class="space-y-6">
<!-- Username Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Correo electrónico o Usuario</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">person</span>
<input class="w-full pl-11 pr-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100" placeholder="ejemplo@fenix.com" type="text"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300">Contraseña</label>
<a class="text-sm font-medium text-primary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full pl-11 pr-12 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all text-slate-900 dark:text-slate-100" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-4 h-4 text-primary border-slate-300 rounded focus:ring-primary" id="remember" type="checkbox"/>
<label class="ml-2 text-sm text-slate-600 dark:text-slate-400" for="remember">Recordarme en este equipo</label>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-4 rounded-lg shadow-lg shadow-primary/20 transition-all transform active:scale-[0.98]" type="submit">
                    Iniciar Sesión
                </button>
</form>
<!-- Footer -->
<div class="mt-12 pt-8 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-sm text-slate-500 dark:text-slate-400">
                    ¿No tienes una cuenta? <br class="md:hidden"/>
<a class="text-primary font-semibold hover:underline" href="#">Contacta al administrador</a>
</p>
</div>
</div>
</div>
</body></html>
